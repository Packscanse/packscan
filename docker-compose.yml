services:
  postgres:
    image: postgres:16
    container_name: packscan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: packscan
      POSTGRES_USER: packscan
      POSTGRES_PASSWORD: packscan_dev
    ports:
      - "5432:5432"
    volumes:
      - packscan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U packscan -d packscan"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  packscan_pgdata:
